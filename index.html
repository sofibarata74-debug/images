<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Image Gallery</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container my-5">
    <h1 class="text-center mb-4">Image Gallery</h1>

    <div class="row g-4">

      <div class="col-12 col-md-6 col-lg-4">
        <img class="img-fluid rounded shadow" src="imagen/cofee.png" alt="Gallery image 1">
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <img class="img-fluid rounded-3 shadow-sm" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=800&auto=format&fit=crop" alt="Gallery image 2">
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <img class="img-fluid rounded-circle shadow-lg" src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=800&auto=format&fit=crop" alt="Gallery image 3">
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <img class="img-fluid rounded-4 shadow" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800&auto=format&fit=crop" alt="Gallery image 4">
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <img class="img-fluid rounded-pill shadow-sm" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=800&auto=format&fit=crop" alt="Gallery image 5">
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <img class="img-fluid rounded-5 shadow-lg" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=800&auto=format&fit=crop" alt="Gallery image 6">
      </div>

    </div>
  </main>

</body>
</html>
